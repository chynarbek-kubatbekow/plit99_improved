services:
  - type: web
    name: plit99-web
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "bash start.sh"
    autoDeploy: true
    disk:
      name: data
      mountPath: /opt/render/project/src/.render-data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
      - key: APP_DATA_DIR
        value: /opt/render/project/src/.render-data
      - key: SQLITE_JOURNAL_MODE
        value: DELETE
      - key: SERVE_MEDIA_FILES
        value: true
