databases:
  - name: plit99-db
    plan: basic-256mb

services:
  - type: web
    name: plit99-web
    runtime: python
    disk:
      name: media-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: "bash build.sh"
    startCommand: "bash start.sh"
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: plit99-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_DATA_DIR
        value: /var/data
      - key: WEB_CONCURRENCY
        value: 1
      - key: SERVE_MEDIA_FILES
        value: true
      - key: WHITENOISE_MANIFEST_STRICT
        value: false
      - key: SECURE_SSL_REDIRECT
        value: false
      - key: PYTHONUNBUFFERED
        value: "1"
